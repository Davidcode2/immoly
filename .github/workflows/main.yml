name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  GITHUB_OWNER: Davidcode2
  APP_REPO_NAME: immoly
  APP_OF_APPS_REPO: app-of-apps
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io
  DEPLOYMENT_DIR: immoly
  DEPLOYMENT_FILE: immoly-app-deployment.yaml

jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Check for relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src:
              - 'src/**'
              - 'src/'

  check-for-new-migrations:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Check for relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src:
              - 'drizzle/migrations/**'
              - 'drizzle/migrations'

  build-and-push:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push.yml
    needs: check-for-changes
    if: needs.check-for-changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
    with:
      image_name: ghcr.io/${{ github.repository }}
      dockerfile: dockerfile
      build_args: |
        SKIP_BUILD_STATIC_GENERATION=true

  deploy-app:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.build-and-push.outputs.version }}

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.GITHUB_OWNER }}
          repositories: ${{ env.APP_OF_APPS_REPO }}

      - name: Checkout app-of-apps repo
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ env.GITHUB_OWNER }}/${{ env.APP_OF_APPS_REPO }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update deployment image tag
        working-directory: ${{ env.DEPLOYMENT_DIR }}
        run: |
          OWNER_LC=$(echo "${{ env.GITHUB_OWNER }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ env.APP_REPO_NAME }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|image: ghcr.io/${OWNER_LC}/${REPO_LC}:.*|image: ghcr.io/${OWNER_LC}/${REPO_LC}:${VERSION}|g" "${{ env.DEPLOYMENT_FILE }}"
          echo "Updated image tag to ${VERSION}"

      - name: Commit and push deployment changes
        working-directory: ${{ env.DEPLOYMENT_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --exit-code && echo "No changes to commit" && exit 0
          git add .
          git commit -m "deploy: ${{ env.APP_REPO_NAME }} v${VERSION}"
          git push

  build-and-push-migrations-image:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-and-push.yml
    needs: check-for-new-migrations
    if: needs.check-for-new-migrations.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
    with:
      image_name: ghcr.io/${{ github.repository }}-migrations
      dockerfile: dockerfile.migrations
